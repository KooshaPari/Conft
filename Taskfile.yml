version: "3"

tasks:
  build:
    desc: Build detected language targets
    cmds:
      - |
        set -eu
        if [ -f rust/phenotype-config/Cargo.toml ]; then
          (cd rust/phenotype-config && cargo build)
        fi
        if [ -f typescript/packages/conft/package.json ]; then
          (cd typescript/packages/conft && bun install --frozen-lockfile)
          task -d typescript/packages/conft build
        fi

  test:
    desc: Run detected language tests
    cmds:
      - |
        set -eu
        if [ -f rust/phenotype-config/Cargo.toml ]; then
          (cd rust/phenotype-config && cargo test)
        fi
        if [ -f typescript/packages/conft/package.json ]; then
          (cd typescript/packages/conft && bun install --frozen-lockfile)
          has_tests=0
          for test_dir in src tests test; do
            if [ -d "typescript/packages/conft/$test_dir" ] && \
              find "typescript/packages/conft/$test_dir" -type f \( \
                -name '*.test.ts' -o -name '*.test.tsx' -o \
                -name '*.spec.ts' -o -name '*.spec.tsx' -o \
                -name '*.test.js' -o -name '*.test.jsx' -o \
                -name '*.spec.js' -o -name '*.spec.jsx' \
              \) | grep -q .; then
              has_tests=1
              break
            fi
          done
          if [ "$has_tests" -eq 1 ]; then
            task -d typescript/packages/conft test
          else
            echo "Skipping TypeScript tests (no test files found)"
          fi
        fi

  lint:
    desc: Run detected language linters
    cmds:
      - |
        set -eu
        if [ -f rust/phenotype-config/Cargo.toml ]; then
          (cd rust/phenotype-config && cargo clippy -- -D warnings)
        fi
        if [ -f typescript/packages/conft/package.json ]; then
          has_eslint_config=0
          for cfg in \
            .eslintrc \
            .eslintrc.json \
            .eslintrc.js \
            .eslintrc.cjs \
            eslint.config.js \
            eslint.config.mjs \
            eslint.config.cjs
          do
            if [ -f "typescript/packages/conft/$cfg" ]; then
              has_eslint_config=1
              break
            fi
          done
          if [ "$has_eslint_config" -eq 1 ]; then
            (cd typescript/packages/conft && bun install --frozen-lockfile)
            task -d typescript/packages/conft lint
          else
            echo "Skipping TypeScript lint (no ESLint config found)"
          fi
        fi

  clean:
    desc: Remove generated artifacts
    cmds:
      - |
        set -eu
        if [ -f rust/phenotype-config/Cargo.toml ]; then
          (cd rust/phenotype-config && cargo clean)
        fi
        if [ -f typescript/packages/conft/package.json ]; then
          rm -rf typescript/packages/conft/dist \
                 typescript/packages/conft/coverage \
                 typescript/packages/conft/.turbo \
                 typescript/packages/conft/.vite
        fi
